# ============================================================================
# SECRETS — COPY THIS FILE TO config/secrets.yaml AND FILL IN YOUR KEYS
# ============================================================================
# NEVER commit secrets.yaml to git (it's in .gitignore)
# ============================================================================

# ── GEMINI API KEYS ────────────────────────────────────────────────────────
# Get a FREE key at: https://aistudio.google.com/app/apikey
# The bot uses Gemini to answer custom application questions (e.g. "Why do you
# want to work here?"). Primary key uses the free tier (generous daily quota).
gemini_api_key: "YOUR_PRIMARY_GEMINI_KEY"

# (Optional) Backup key via Google Cloud $300 free credits.
# The bot auto-switches to this if the primary key hits its daily quota.
# Get GCP credits: https://cloud.google.com/free
gemini_backup_api_key: ""

# Hard cap on backup key spend (in USD). Bot stops using it after this.
gemini_backup_budget_cap: 5.00

# ── CAPTCHA SOLVER ─────────────────────────────────────────────────────────
# Required for Greenhouse jobs (they use invisible reCAPTCHA).
# Get a key at: https://2captcha.com  — costs ~$3 per 1000 CAPTCHAs
# Alternatively use Anti-Captcha: https://anti-captcha.com
twocaptcha_api_key: "YOUR_2CAPTCHA_KEY"

# ── GITHUB TOKEN (optional) ────────────────────────────────────────────────
# Only needed if you hit GitHub rate limits when watching the job list.
# Create at: https://github.com/settings/tokens (no scopes needed, just public read)
github_token: ""

# ── EMAIL (optional) ───────────────────────────────────────────────────────
# For tracking responses to your applications via Gmail.
# Create an App Password: https://myaccount.google.com/apppasswords
email_address: ""
email_app_password: ""
