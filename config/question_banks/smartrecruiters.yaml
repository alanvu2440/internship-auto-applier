    military, ground, naval or air service during a war, or in a campaign or expedition for which a campaign badge has been authorized under the laws administered by the department of defense. • an “armed
    forces service medal veteran” means a veteran who, while serving on active duty in the u.s. military, ground, naval or air service, participated in a united states military operation for which an armed
    forces service medal was awarded pursuant to executive order 12985. protected veterans may have additional rights under userra—the uniformed services employment and reemployment rights act. in particular,
